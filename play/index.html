<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Play Lines of Action</title>
  <link rel="canonical" href="https://vlepa.app/play/" />
  <style>
    :root { --bg:#2C1810; --panel:#3E2723; --border:#6D4C2A; --gold:#D4A76A; }
    * { box-sizing: border-box; }
    body {
      margin:0; min-height:100vh; display:flex; align-items:center;
      justify-content:center; background:var(--bg); color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      padding:24px;
    }
    .card {
      width:100%; max-width:360px; background:var(--panel);
      border:1px solid var(--border); border-radius:20px; padding:28px 24px;
      text-align:center;
    }
    h1 { color:var(--gold); font-size:22px; margin:0 0 6px; }
    p { color:#ffffffb3; font-size:14px; margin:6px 0 0; line-height:1.5; }
    .code-label { color:#ffffff80; font-size:12px; margin-top:22px; letter-spacing:.08em; text-transform:uppercase; }
    .code {
      font-size:40px; font-weight:700; letter-spacing:.18em; color:var(--gold);
      margin:4px 0 18px; font-variant-numeric:tabular-nums;
    }
    .code.hidden { display:none; }
    .btn {
      display:block; width:100%; padding:14px; margin-top:12px; border-radius:12px;
      font-size:15px; font-weight:600; text-decoration:none; border:1px solid var(--border);
    }
    .btn-primary { background:var(--gold); color:#2C1810; border-color:var(--gold); }
    .btn-secondary { background:transparent; color:var(--gold); }
    .hint { margin-top:20px; font-size:12px; color:#ffffff66; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Lines of Action</h1>
    <p>Your friend invited you to an online match.</p>

    <div id="codeBlock">
      <div class="code-label">Game code</div>
      <div class="code" id="code">––––</div>
      <p>Open the app and tap <b>Join by Code</b>, then enter this code.</p>
    </div>

    <a class="btn btn-primary" id="appstore"
       href="https://apps.apple.com/app/id6761025215">Get it on the App Store</a>
    <a class="btn btn-secondary" id="playstore"
       href="https://play.google.com/store/apps/details?id=app.vlepa.linesofaction">Get it on Google Play</a>

    <div class="hint">Already have the app? Tapping the invite link opens it automatically.</div>
  </div>

  <script>
    // Code can arrive as /play/4729 (pretty link) or /play/?c=4729 (query).
    (function () {
      var path = location.pathname.replace(/\/+$/, ""); // strip trailing slash
      var m = path.match(/\/play\/([A-Za-z0-9]+)/);
      var code = m ? m[1] : new URLSearchParams(location.search).get("c");
      var el = document.getElementById("code");
      if (code) {
        el.textContent = code;
      } else {
        document.getElementById("codeBlock").style.display = "none";
      }
    })();
  </script>
</body>
</html>
